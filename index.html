<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>单词打地鼠 V2 - 幼儿英语听力游戏</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--primary:#FF6B6B;--primary-light:#FF8E8E;--primary-dark:#E05555;--secondary:#4ECDC4;--accent:#FFE66D;--accent-dark:#F0D456;--bg:#F0F4F8;--bg-card:#FFFFFF;--text:#2D3436;--text-light:#636E72;--text-muted:#B2BEC3;--border:#DFE6E9;--success:#00B894;--warning:#FDCB6E;--danger:#E17055;--shadow:0 2px 12px rgba(0,0,0,.06);--shadow-lg:0 8px 30px rgba(0,0,0,.10);--radius:14px;--radius-sm:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.nav{background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;height:54px;box-shadow:0 1px 4px rgba(0,0,0,.04);position:sticky;top:0;z-index:100}
.nav-logo{font-size:18px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:6px;cursor:pointer}
.nav-logo span{font-size:22px}
.nav-tabs{display:flex;margin-left:32px;gap:4px}
.nav-tab{padding:7px 18px;border-radius:20px;border:none;background:transparent;color:var(--text-light);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.nav-tab:hover{background:#f0f0f0}
.nav-tab.active{background:var(--primary);color:#fff}

.page{display:none;padding:20px;max-width:1100px;margin:0 auto}
.page.active{display:block}

/* Admin */
.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.admin-header h2{font-size:20px;font-weight:700}
.admin-stats{display:flex;gap:10px;flex-wrap:wrap}
.stat-card{background:var(--bg-card);padding:10px 16px;border-radius:var(--radius-sm);box-shadow:var(--shadow);display:flex;flex-direction:column;min-width:80px}
.stat-card .label{font-size:11px;color:var(--text-muted)}
.stat-card .value{font-size:22px;font-weight:700;color:var(--primary)}
.admin-filters{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.admin-filters select,.admin-filters input{padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:#fff}
.admin-filters input{min-width:160px}

.btn{padding:7px 16px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-success{background:var(--success);color:#fff}
.btn-warning{background:var(--warning);color:var(--text)}
.btn-blue{background:#4A90D9;color:#fff}
.btn-blue:hover{background:#357ABD}

.table-wrapper{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.table-scroll{overflow-x:auto;max-height:calc(100vh - 360px);overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#f8f9fa;padding:10px 14px;text-align:left;font-weight:600;color:var(--text-light);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:1;white-space:nowrap}
tbody td{padding:8px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tbody tr:hover{background:#fafbfc}

.photo-cell{text-align:center;width:54px;position:relative}
.photo-cell img{width:40px;height:40px;border-radius:8px;object-fit:cover;border:1px solid var(--border);cursor:pointer;transition:transform .2s}
.photo-cell img:hover{transform:scale(1.5);z-index:10;position:relative;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.photo-cell .no-photo{color:var(--text-muted);font-size:11px}
.photo-cell .remove-photo{position:absolute;top:2px;right:4px;background:rgba(255,0,0,.7);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:9px;cursor:pointer;display:none;line-height:1}
.photo-cell:hover .remove-photo{display:block}

.emoji-cell{font-size:22px;text-align:center;width:50px}
.word-cell{font-weight:600;font-size:15px}
.category-tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.difficulty-tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}
.difficulty-简单{background:#e8f5e9;color:#2e7d32}
.difficulty-中等{background:#fff3e0;color:#ef6c00}
.difficulty-困难{background:#ffebee;color:#c62828}
.edit-select{padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:#fff}
.edit-input{padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:#fff;width:120px}

.pagination{display:flex;justify-content:center;align-items:center;gap:6px;padding:12px}
.pagination button{padding:5px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:12px}
.pagination button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.pagination button:disabled{opacity:.4;cursor:not-allowed}

.bulk-actions{display:flex;gap:6px;align-items:center;padding:8px 14px;background:#FFF8E1;border-bottom:1px solid #FFE082;font-size:12px;flex-wrap:wrap}
.bulk-actions .bulk-label{font-weight:600;color:#F57F17}
.bulk-group{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.bulk-group label{font-size:11px;color:var(--text-light);font-weight:600}
.bulk-sep{width:1px;height:20px;background:#e0d0a0;margin:0 4px}

/* Photo fetch progress */
.photo-fetch-bar{margin:12px 0;padding:12px 16px;background:linear-gradient(135deg,#E3F2FD,#BBDEFB);border-radius:var(--radius);font-size:13px;color:#1565C0;display:none}
.photo-fetch-bar .bar{height:8px;background:#BBDEFB;border-radius:4px;margin-top:8px;overflow:hidden}
.photo-fetch-bar .bar-fill{height:100%;background:linear-gradient(90deg,#1976D2,#42A5F5);border-radius:4px;transition:width .3s}
.photo-fetch-bar .stats{display:flex;gap:16px;margin-top:8px;font-size:12px}
.photo-fetch-bar .stats span{color:#0D47A1;font-weight:600}

/* Game Select */
.game-setup{max-width:660px;margin:0 auto}
.game-setup h2{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px}
.game-setup .subtitle{text-align:center;color:var(--text-light);margin-bottom:24px;font-size:14px}
.setup-section{background:var(--bg-card);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.setup-section h3{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.chip-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 14px;border:2px solid var(--border);border-radius:18px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;background:#fff;user-select:none}
.chip:hover{border-color:var(--primary);color:var(--primary)}
.chip.selected{background:var(--primary);color:#fff;border-color:var(--primary)}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.chip .count{display:inline-block;background:rgba(0,0,0,.08);border-radius:8px;padding:0 5px;font-size:10px;margin-left:3px}
.chip.selected .count{background:rgba(255,255,255,.25)}
.chip-select-all{background:#f8f9fa;border-style:dashed;font-weight:600}
.chip-select-all.selected{background:var(--accent);color:var(--text);border-color:var(--accent-dark);border-style:solid}

.game-preview{background:var(--bg-card);border-radius:var(--radius);padding:18px 22px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.preview-info{display:flex;gap:20px;flex-wrap:wrap}
.preview-item{display:flex;flex-direction:column}
.preview-item .label{font-size:11px;color:var(--text-muted)}
.preview-item .value{font-size:18px;font-weight:700;color:var(--primary)}

.btn-start{padding:12px 40px;font-size:16px;font-weight:700;border-radius:28px;border:none;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;cursor:pointer;transition:all .2s;box-shadow:0 4px 15px rgba(255,107,107,.35)}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,107,107,.45)}
.btn-start:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

.question-count-select{display:flex;gap:6px;margin-top:12px;align-items:center}
.question-count-select label{font-size:13px;color:var(--text-light);margin-right:4px}
.question-count-select .chip{padding:4px 12px}

/* Game */
.game-container{max-width:700px;margin:0 auto;text-align:center;padding-top:8px}
.game-top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:10px 16px;background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow)}
.game-score{font-size:18px;font-weight:700}
.game-score span{color:var(--primary)}
.game-progress{font-size:13px;color:var(--text-light)}

.word-prompt{font-size:32px;font-weight:700;margin:16px 0 4px;color:var(--primary);min-height:44px}
.play-btn{width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;font-size:22px;cursor:pointer;transition:all .2s;box-shadow:0 4px 12px rgba(255,107,107,.25);margin:8px auto 16px;display:flex;align-items:center;justify-content:center}
.play-btn:hover{transform:scale(1.1)}
.play-btn:active{transform:scale(.95)}

.mole-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px;max-width:460px;margin:0 auto}
.mole-hole{position:relative;height:120px;border-radius:var(--radius);background:linear-gradient(180deg,#8B7355,#6B5340);overflow:hidden;cursor:pointer;box-shadow:inset 0 4px 8px rgba(0,0,0,.3)}
.mole-hole .hole-top{position:absolute;bottom:0;left:0;right:0;height:26px;background:#5C432D;border-radius:50% 50% 0 0;z-index:2}
.mole{position:absolute;bottom:8px;left:50%;transform:translateX(-50%) translateY(100%);transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:1;display:flex;flex-direction:column;align-items:center}
.mole.show{transform:translateX(-50%) translateY(0)}
.mole .mole-emoji{font-size:44px;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3))}
.mole .mole-photo{width:60px;height:60px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.25);background:#f5f5f5}
.mole .mole-body{width:64px;height:24px;background:linear-gradient(180deg,#A0845C,#8B7355);border-radius:50% 50% 0 0;margin-top:-3px}
.mole.correct .mole-emoji,.mole.correct .mole-photo{animation:correctBounce .5s ease}
.mole.wrong .mole-emoji,.mole.wrong .mole-photo{animation:wrongShake .5s ease}
@keyframes correctBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* Pick mode */
.pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:420px;margin:0 auto;padding:10px}
.pick-option{padding:18px;font-size:17px;font-weight:600;border:2px solid var(--border);border-radius:var(--radius);background:#fff;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.pick-option:hover{border-color:var(--primary);color:var(--primary);transform:scale(1.02)}
.pick-option .pick-photo{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid var(--border)}
.pick-option .pick-emoji{font-size:28px}
.pick-option .pick-text{font-size:15px;font-weight:600}

/* Feedback */
.game-feedback{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:1000;pointer-events:none}
.feedback-emoji{font-size:72px;animation:feedbackPop .8s ease forwards}
@keyframes feedbackPop{0%{transform:scale(0);opacity:1}50%{transform:scale(1.5);opacity:1}100%{transform:scale(2);opacity:0}}

/* Result */
.result-container{max-width:480px;margin:30px auto;text-align:center}
.result-card{background:var(--bg-card);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow-lg)}
.result-score{font-size:56px;font-weight:700;color:var(--primary);line-height:1}
.result-label{font-size:14px;color:var(--text-light);margin-top:2px}
.result-stars{font-size:36px;margin:16px 0}
.result-details{margin-top:16px;text-align:left;max-height:300px;overflow-y:auto}
.result-word{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.result-word .rw-img{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid var(--border)}
.result-word .rw-emoji{font-size:18px}
.result-word .word{font-weight:600;flex:1;margin-left:8px}
.result-word .status{font-size:11px;padding:2px 8px;border-radius:8px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:8px 20px;border-radius:18px;font-size:13px;z-index:3000;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Responsive */
@media(max-width:640px){
  .nav{padding:0 10px}
  .nav-tabs{margin-left:10px}
  .nav-tab{padding:5px 10px;font-size:12px}
  .page{padding:12px}
  .mole-grid{gap:10px;padding:8px}
  .mole-hole{height:105px}
  .mole .mole-emoji{font-size:38px}
  .mole .mole-photo{width:52px;height:52px}
  .word-prompt{font-size:26px}
  .btn-start{padding:10px 30px;font-size:14px}
  .admin-filters select,.admin-filters input{min-width:auto}
  .bulk-actions{flex-direction:column;align-items:flex-start}
  .photo-cell img:hover{transform:scale(2)}
}
</style>
</head>
<body>
<!-- 页面加载失败时的提示（JS正常后会被init()隐藏） -->
<div id="init-error" style="display:none;padding:40px;text-align:center;color:#E17055;font-size:16px;line-height:1.8">
  ⚠️ 页面脚本加载失败，请尝试刷新页面（Ctrl+F5）<br>
  <span style="font-size:13px;color:#999">如多次失败，请联系开发者</span>
</div>

<nav class="nav">
  <div class="nav-logo" onclick="switchPage('admin')"><span>🐹</span> 单词打地鼠 V2</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-page="admin" onclick="switchPage('admin')">📋 词库管理</button>
    <button class="nav-tab" data-page="game-select" onclick="switchPage('game-select')">🎮 开始游戏</button>
  </div>
</nav>

<!-- ===== Admin ===== -->
<div class="page active" id="page-admin">
  <div class="admin-header">
    <h2>词库管理</h2>
    <div class="admin-stats">
      <div class="stat-card"><span class="label">总词数</span><span class="value" id="stat-total">0</span></div>
      <div class="stat-card"><span class="label">有照片</span><span class="value" id="stat-photos" style="color:#4A90D9">0</span></div>
      <div class="stat-card"><span class="label">有Emoji</span><span class="value" id="stat-emoji" style="color:var(--secondary)">0</span></div>
      <div class="stat-card"><span class="label">分类数</span><span class="value" id="stat-cats" style="color:var(--primary)">0</span></div>
    </div>
  </div>
  <div class="admin-filters">
    <select id="filter-category" onchange="currentPage=1;renderTable()"><option value="">全部分类</option></select>
    <select id="filter-difficulty" onchange="currentPage=1;renderTable()">
      <option value="">全部难度</option><option value="简单">简单</option><option value="中等">中等</option><option value="困难">困难</option>
    </select>
    <select id="filter-proficiency" onchange="currentPage=1;renderTable()">
      <option value="">全部熟练度</option><option value="未学习">未学习</option><option value="认识">认识</option><option value="熟悉">熟悉</option><option value="掌握">掌握</option>
    </select>
    <select id="filter-image" onchange="currentPage=1;renderTable()">
      <option value="">全部图片</option><option value="photo">有照片</option><option value="emoji">有Emoji</option><option value="none">无图片</option>
    </select>
    <input type="text" id="filter-search" placeholder="搜索单词..." oninput="currentPage=1;renderTable()">
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <button class="btn btn-blue btn-sm" onclick="batchFetchPhotos()">🖼️ 批量获取图片</button>
    <button class="btn btn-outline btn-sm" onclick="exportExcel()">📥 导出Excel</button>
    <button class="btn btn-outline btn-sm" onclick="exportJSON()">📥 导出JSON</button>
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('import-file').click()">📤 导入</button>
    <input type="file" id="import-file" accept=".xlsx,.xls,.json" style="display:none" onchange="handleImport(event)">
    <button class="btn btn-outline btn-sm" onclick="restoreDefault()" style="color:#e74c3c;border-color:#e74c3c">♻️ 恢复默认词库</button>
    <button class="btn btn-outline btn-sm" onclick="autoAssignEmoji()">😊 自动匹配Emoji</button>
  </div>
  <div class="photo-fetch-bar" id="photo-progress"></div>

  <!-- Bulk actions -->
  <div class="bulk-actions" id="bulk-actions" style="display:none">
    <span class="bulk-label">已选 <span id="bulk-count">0</span> 项</span>
    <div class="bulk-sep"></div>
    <div class="bulk-group"><label>分类:</label><select id="bulk-category" class="edit-select"></select><button class="btn btn-sm btn-outline" onclick="bulkSetCategory()">应用</button></div>
    <div class="bulk-sep"></div>
    <div class="bulk-group"><label>难度:</label><select id="bulk-difficulty" class="edit-select"><option value="简单">简单</option><option value="中等">中等</option><option value="困难">困难</option></select><button class="btn btn-sm btn-outline" onclick="bulkSetDifficulty()">应用</button></div>
    <div class="bulk-sep"></div>
    <div class="bulk-group"><label>熟练度:</label><select id="bulk-proficiency" class="edit-select"><option value="未学习">未学习</option><option value="认识">认识</option><option value="熟悉">熟悉</option><option value="掌握">掌握</option></select><button class="btn btn-sm btn-outline" onclick="bulkSetProficiency()">应用</button></div>
    <div class="bulk-sep"></div>
    <button class="btn btn-sm btn-outline" onclick="clearSelection()">取消选择</button>
  </div>

  <div class="table-wrapper">
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th style="width:36px"><input type="checkbox" id="select-all" onchange="toggleSelectAll()"></th>
          <th style="width:54px">照片</th>
          <th style="width:50px">Emoji</th>
          <th>单词</th>
          <th>语义分类</th>
          <th>难度</th>
          <th>熟练度</th>
          <th>备注</th>
        </tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- ===== Game Select ===== -->
<div class="page" id="page-game-select">
  <div class="game-setup">
    <h2>🎮 选择游戏范围</h2>
    <p class="subtitle">选择游戏类型，然后筛选要测试的单词</p>

    <!-- ① 游戏类型 -->
    <div class="setup-section">
      <h3>🎲 游戏类型 <span style="font-size:11px;color:var(--text-muted)">（必选）</span></h3>
      <div class="chip-group" id="display-mode-chips">
        <div class="chip active" data-value="image" onclick="toggleDisplayMode(this)">🖼️ 图片呈现</div>
        <div class="chip" data-value="text" onclick="toggleDisplayMode(this)">🔤 文字呈现</div>
      </div>
    </div>

    <!-- ② 难度 -->
    <div class="setup-section">
      <h3>🎯 难度 <span style="font-size:11px;color:var(--text-muted)">（可多选）</span></h3>
      <div class="chip-group" id="difficulty-chips"></div>
    </div>

    <!-- ③ 题目数量 -->
    <div class="setup-section">
      <h3>🔢 题目数量</h3>
      <div class="question-count-select" id="question-count-chips"></div>
    </div>

    <!-- ④ 语义分类 -->
    <div class="setup-section">
      <h3>📚 语义分类 <span style="font-size:11px;color:var(--text-muted)">（可多选）</span></h3>
      <div class="chip-group" id="category-chips"></div>
    </div>

    <!-- ⑤ 备注筛选 -->
    <div class="setup-section">
      <h3>📝 备注筛选 <span style="font-size:11px;color:var(--text-muted)">（可多选，按备注内容筛选）</span></h3>
      <div class="chip-group" id="note-chips"></div>
    </div>

<script>
// ===== Global Error Handler =====
window.onerror = function(msg, url, line, col, err) {
  const el = document.getElementById('init-error');
  if (el) el.style.display = 'block';
};

// ===== Data =====
let wordDatabase=[];
const STORAGE_KEY='word_mole_v2_db';
const PHOTO_CACHE_KEY='word_photos_v2';
const PAGE_SIZE=50;
let currentPage=1;
let selectedWords=new Set();
let selectedCategories=new Set();
let selectedProficiencies=new Set();
let selectedDifficulties=new Set();
let selectedNotes=new Set();
let questionCount=10;
let gameWords=[];
let currentQuestionIndex=0;
let gameScore=0;
let gameResults=[];
let currentCorrectWord=null;
let isProcessing=false;
let gameMode='mole';
let displayMode='image'; // 'image' or 'text'
let isFetchingPhotos=false;

// ===== Photo Cache =====
function getPhotoCache(){
  try{return JSON.parse(localStorage.getItem(PHOTO_CACHE_KEY)||'{}')}
  catch(e){return{}}
}
function savePhotoCache(c){localStorage.setItem(PHOTO_CACHE_KEY,JSON.stringify(c))}
function getWordPhoto(word){return getPhotoCache()[word]||null}
function removeWordPhoto(word){const c=getPhotoCache();delete c[word];savePhotoCache(c);renderTable();updateStats()}

// Fetch a single word photo from Wikipedia
async function fetchWordPhoto(word){
  try{
    // Try the word as-is first, then capitalize first letter
    const attempts=[word, word.charAt(0).toUpperCase()+word.slice(1)];
    for(const q of attempts){
      const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
      if(!r.ok)continue;
      const d=await r.json();
      if(d.thumbnail&&d.thumbnail.source){
        // Get a bigger thumbnail (200px)
        let url=d.thumbnail.source;
        url=url.replace(/\/\d+px-/, '/200px-');
        // Check if it's a reasonable image (not a flag, map, etc for most words)
        return url;
      }
    }
  }catch(e){console.warn('Photo fetch failed:',word,e)}
  return null;
}

// Batch fetch photos with progress
async function batchFetchPhotos(){
  if(isFetchingPhotos)return;
  isFetchingPhotos=true;
  const cache=getPhotoCache();
  // Fetch for words that have emoji but no photo yet
  const needFetch=wordDatabase.filter(w=>!cache[w.word]);
  if(needFetch.length===0){showToast('所有单词的图片已获取！');isFetchingPhotos=false;return}

  const el=document.getElementById('photo-progress');
  el.style.display='block';
  el.innerHTML=`正在获取图片... 0/${needFetch.length}<div class="bar"><div class="bar-fill" style="width:0%"></div></div><div class="stats"><span>成功: 0</span><span>失败: 0</span></div>`;

  const batchSize=5;
  let fetched=0,success=0,fail=0;

  for(let i=0;i<needFetch.length;i+=batchSize){
    const batch=needFetch.slice(i,i+batchSize);
    const results=await Promise.all(batch.map(async w=>{
      const url=await fetchWordPhoto(w.word);
      if(url){cache[w.word]=url;return true}
      return false;
    }));
    success+=results.filter(r=>r).length;
    fail+=results.filter(r=>!r).length;
    fetched+=batch.length;

    const pct=Math.round(fetched/needFetch.length*100);
    el.innerHTML=`正在获取图片... ${fetched}/${needFetch.length} (${pct}%)<div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div><div class="stats"><span>✅ 成功: ${success}</span><span>❌ 失败: ${fail}</span></div>`;

    // Rate limiting - be nice to Wikipedia
    await new Promise(r=>setTimeout(r,300));
  }

  savePhotoCache(cache);
  el.innerHTML=`✅ 完成！成功获取 ${success} 张图片，${fail} 个词未找到<div class="bar"><div class="bar-fill" style="width:100%"></div></div>`;
  setTimeout(()=>{el.style.display='none'},5000);

  updateStats();renderTable();renderGameSelect();
  isFetchingPhotos=false;
}

// ===== Cute Voice =====
let cuteVoice=null;

function initVoices(){
  return new Promise(resolve=>{
    const voices=speechSynthesis.getVoices();
    if(voices.length>0){resolve(voices);return}
    speechSynthesis.onvoiceschanged=()=>resolve(speechSynthesis.getVoices());
    setTimeout(()=>resolve(speechSynthesis.getVoices()),2000);
  });
}

function getCuteVoice(){
  if(cuteVoice)return cuteVoice;
  const voices=speechSynthesis.getVoices();
  const preferred=['Samantha','Karen','Victoria','Zira','Hazel','Fiona','Moira','Tessa','Susan','Kate','Allison','Nicky','Joana','Paulina'];
  for(const name of preferred){
    const v=voices.find(v=>v.lang.startsWith('en-US')&&v.name.includes(name));
    if(v){cuteVoice=v;return v}
  }
  const enUS=voices.filter(v=>v.lang.startsWith('en-US'));
  if(enUS.length>0){cuteVoice=enUS[0];return cuteVoice}
  const enAny=voices.filter(v=>v.lang.startsWith('en'));
  if(enAny.length>0){cuteVoice=enAny[0];return cuteVoice}
  return null;
}

function sanitize(word){
  // Match Python sanitize_filename()
  return word.replace(/[<>:"/\\|?*]/g,'-').replace(/'/g,'').replace(/ /g,'_').substring(0,100);
}

function playCurrentWord(){
  if(!currentCorrectWord)return;
  const word=currentCorrectWord.word;
  const audioUrl='audio/'+sanitize(word)+'.mp3';
  console.log('Trying audio:', audioUrl);
  const audio=new Audio(audioUrl);
  audio.oncanplaythrough=()=>{console.log('Audio OK, playing:', word);audio.play()};
  audio.onerror=()=>{console.log('Audio load failed, fallback to speech:', audioUrl);playWithSpeech(word)};
  audio.play().catch(e=>{console.log('Audio play failed:', e);playWithSpeech(word)});
}

function playWithSpeech(word){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);
  u.lang='en-US';u.rate=0.8;u.pitch=1.3;u.volume=1.0;
  const v=getCuteVoice();if(v)u.voice=v;
  speechSynthesis.speak(u);
}

// ===== Display Mode =====
function toggleDisplayMode(el){
  document.querySelectorAll('#display-mode-chips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  displayMode = el.dataset.value;
  updateGamePreview();
}

// ===== Init =====
function init(){
  try{
    loadData();renderTable();renderGameSelect();updateStats();initVoices();
    // 隐藏加载提示
    const el=document.getElementById('init-error');
    if(el)el.style.display='none';
  }catch(e){
    const el=document.getElementById('init-error');
    if(el){el.style.display='block';el.innerHTML='页面初始化出错：'+e.message+'<br>请尝试刷新页面，或联系开发者。'}
    console.error('init error:',e);
  }
}

function loadData(){
  const saved=localStorage.getItem(STORAGE_KEY);
  if(saved){
    wordDatabase=JSON.parse(saved);
    wordDatabase.forEach(w=>{if(!w.difficulty)w.difficulty='中等';if(!w.note)w.note=''});
  }else{
    wordDatabase=DEFAULT_WORD_DATA;
    wordDatabase.forEach(w=>{
      if(!w.difficulty){
        if(w.word.length<=3)w.difficulty='简单';
        else if(w.word.length<=5)w.difficulty='中等';
        else w.difficulty='困难';
      }
      if(!w.note)w.note='';
    });
    saveData();
  }
}
function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(wordDatabase))}

function updateStats(){
  const pc=getPhotoCache();
  const photoCount=wordDatabase.filter(w=>pc[w.word]).length;
  document.getElementById('stat-total').textContent=wordDatabase.length;
  document.getElementById('stat-photos').textContent=photoCount;
  document.getElementById('stat-emoji').textContent=wordDatabase.filter(w=>w.emoji).length;
  document.getElementById('stat-cats').textContent=new Set(wordDatabase.map(w=>w.category)).size;
}

// ===== Table =====
function getFilteredData(){
  const catF=document.getElementById('filter-category').value;
  const diffF=document.getElementById('filter-difficulty').value;
  const profF=document.getElementById('filter-proficiency').value;
  const imgF=document.getElementById('filter-image').value;
  const search=document.getElementById('filter-search').value.toLowerCase().trim();
  const pc=getPhotoCache();
  return wordDatabase.filter(w=>{
    if(catF&&w.category!==catF)return false;
    if(diffF&&w.difficulty!==diffF)return false;
    if(profF&&w.proficiency!==profF)return false;
    if(imgF==='photo'&&!pc[w.word])return false;
    if(imgF==='emoji'&&!w.emoji)return false;
    if(imgF==='none'&&(pc[w.word]||w.emoji))return false;
    if(search&&!w.word.toLowerCase().includes(search)&&!(w.note&&w.note.toLowerCase().includes(search)))return false;
    return true;
  });
}

function renderTable(){
  const data=getFilteredData();
  const totalPages=Math.ceil(data.length/PAGE_SIZE);
  if(currentPage>totalPages)currentPage=Math.max(1,totalPages);
  const start=(currentPage-1)*PAGE_SIZE;
  const pageData=data.slice(start,start+PAGE_SIZE);

  // Refresh category filter
  const catSelect=document.getElementById('filter-category');
  const curCat=catSelect.value;
  const cats=[...new Set(wordDatabase.map(w=>w.category))].sort();
  catSelect.innerHTML='<option value="">全部分类</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  catSelect.value=curCat;

  // Bulk category
  const bCat=document.getElementById('bulk-category');
  bCat.innerHTML='<option value="">不修改</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');

  const pc=getPhotoCache();
  const tbody=document.getElementById('table-body');
  tbody.innerHTML=pageData.map(w=>{
    const gi=wordDatabase.indexOf(w);
    const chk=selectedWords.has(gi)?'checked':'';
    const cc=getCategoryColor(w.category);
    const photo=pc[w.word];
    const photoHtml=photo
      ?`<img src="${photo}" alt="${w.word}" loading="lazy" onerror="this.outerHTML='<span class=\\'no-photo\\'>❌</span>'"><button class="remove-photo" onclick="event.stopPropagation();removeWordPhoto('${w.word}')" title="移除照片">✕</button>`
      :`<span class="no-photo">—</span>`;
    return`<tr>
      <td><input type="checkbox" ${chk} onchange="toggleWord(${gi})"></td>
      <td class="photo-cell">${photoHtml}</td>
      <td class="emoji-cell">${w.emoji||'—'}</td>
      <td class="word-cell">${w.word}</td>
      <td><span class="category-tag" style="background:${cc.bg};color:${cc.text}">${w.category}</span></td>
      <td><span class="difficulty-tag difficulty-${w.difficulty||'中等'}">${w.difficulty||'中等'}</span></td>
      <td><select class="edit-select" onchange="updateField(${gi},'proficiency',this.value)">
        <option value="未学习" ${w.proficiency==='未学习'?'selected':''}>未学习</option>
        <option value="认识" ${w.proficiency==='认识'?'selected':''}>认识</option>
        <option value="熟悉" ${w.proficiency==='熟悉'?'selected':''}>熟悉</option>
        <option value="掌握" ${w.proficiency==='掌握'?'selected':''}>掌握</option>
      </select></td>
      <td><input class="edit-input" value="${(w.note||'').replace(/"/g,'&quot;')}" onchange="updateField(${gi},'note',this.value)" placeholder="添加备注..."></td>
    </tr>`;
  }).join('');

  renderPagination(totalPages);
  updateBulkActions();
}

function renderPagination(totalPages){
  const c=document.getElementById('pagination');
  if(totalPages<=1){c.innerHTML='';return}
  let h=`<button ${currentPage<=1?'disabled':''} onclick="currentPage--;renderTable()">‹</button>`;
  const s=Math.max(1,currentPage-2),e=Math.min(totalPages,currentPage+2);
  if(s>1)h+=`<button onclick="currentPage=1;renderTable()">1</button>`;
  if(s>2)h+='<span>…</span>';
  for(let i=s;i<=e;i++)h+=`<button class="${i===currentPage?'active':''}" onclick="currentPage=${i};renderTable()">${i}</button>`;
  if(e<totalPages-1)h+='<span>…</span>';
  if(e<totalPages)h+=`<button onclick="currentPage=${totalPages};renderTable()">${totalPages}</button>`;
  h+=`<button ${currentPage>=totalPages?'disabled':''} onclick="currentPage++;renderTable()">›</button>`;
  h+=`<span style="font-size:12px;color:var(--text-muted);margin-left:6px">共${getFilteredData().length}词</span>`;
  c.innerHTML=h;
}

function getCategoryColor(cat){
  const C=[{bg:'#FFEEE0',text:'#E65100'},{bg:'#E8F5E9',text:'#2E7D32'},{bg:'#E3F2FD',text:'#1565C0'},{bg:'#FFF3E0',text:'#EF6C00'},{bg:'#FCE4EC',text:'#C62828'},{bg:'#F3E5F5',text:'#7B1FA2'},{bg:'#E0F7FA',text:'#00838F'},{bg:'#FFF8E1',text:'#F57F17'},{bg:'#EFEBE9',text:'#4E342E'},{bg:'#E8EAF6',text:'#283593'}];
  return C[cat.split('').reduce((a,c)=>a+c.charCodeAt(0),0)%C.length];
}

function toggleWord(i){if(selectedWords.has(i))selectedWords.delete(i);else selectedWords.add(i);updateBulkActions();renderTable()}
function toggleSelectAll(){
  const checked=document.getElementById('select-all').checked;
  getFilteredData().forEach(w=>{const i=wordDatabase.indexOf(w);if(checked)selectedWords.add(i);else selectedWords.delete(i)});
  renderTable();
}
function updateBulkActions(){const n=selectedWords.size;document.getElementById('bulk-count').textContent=n;document.getElementById('bulk-actions').style.display=n>0?'flex':'none'}
function clearSelection(){selectedWords.clear();document.getElementById('select-all').checked=false;renderTable()}

function bulkSetCategory(){const v=document.getElementById('bulk-category').value;if(!v)return showToast('请选择分类');selectedWords.forEach(i=>{wordDatabase[i].category=v});saveData();updateStats();showToast(`已将${selectedWords.size}个词设为"${v}"`);renderTable()}
function bulkSetDifficulty(){const v=document.getElementById('bulk-difficulty').value;selectedWords.forEach(i=>{wordDatabase[i].difficulty=v});saveData();showToast(`已将${selectedWords.size}个词设为"${v}"`);renderTable()}
function bulkSetProficiency(){const v=document.getElementById('bulk-proficiency').value;selectedWords.forEach(i=>{wordDatabase[i].proficiency=v});saveData();updateStats();showToast(`已将${selectedWords.size}个词设为"${v}"`);renderTable()}

function updateField(i,field,v){wordDatabase[i][field]=v;saveData();updateStats()}

// ===== Excel Import/Export =====
function exportExcel(){
  if(typeof XLSX==='undefined'){showToast('Excel库加载中，请稍后重试');return}
  const pc=getPhotoCache();
  const data=wordDatabase.map(w=>({'单词':w.word,'语义分类':w.category,'难度':w.difficulty||'中等','熟练度':w.proficiency,'备注':w.note||'','Emoji':w.emoji||'','照片URL':pc[w.word]||''}));
  const ws=XLSX.utils.json_to_sheet(data);
  ws['!cols']=[{wch:18},{wch:14},{wch:8},{wch:10},{wch:20},{wch:6},{wch:40}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'词库');
  XLSX.writeFile(wb,'单词词库.xlsx');showToast('Excel导出成功！');
}

function exportJSON(){
  const pc=getPhotoCache();
  const data=wordDatabase.map(w=>({...w,photoUrl:pc[w.word]||''}));
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='word_database.json';a.click();
  showToast('JSON导出成功！');
}

function handleImport(e){
  const f=e.target.files[0];if(!f)return;
  const ext=f.name.split('.').pop().toLowerCase();
  if(ext==='xlsx'||ext==='xls'){
    if(typeof XLSX==='undefined'){showToast('Excel库加载中，请稍后重试');e.target.value='';return}
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws);
        if(rows.length===0){showToast('文件为空');return}
        const pc=getPhotoCache();
        const imported=rows.map(r=>{
          const word=(r['单词']||r['word']||r['Word']||'').toString().trim().toLowerCase();
          const category=r['语义分类']||r['分类']||r['category']||r['Category']||'';
          const difficulty=r['难度']||r['difficulty']||r['Difficulty']||'中等';
          const proficiency=r['熟练度']||r['proficiency']||r['Proficiency']||'未学习';
          const note=r['备注']||r['note']||r['Note']||'';
          const emoji=r['Emoji']||r['emoji']||'';
          const photoUrl=r['照片URL']||r['photoUrl']||r['photo_url']||'';
          if(photoUrl)pc[word]=photoUrl;
          const validDiff=['简单','中等','困难'];const diff=validDiff.includes(difficulty)?difficulty:'中等';
          const validProf=['未学习','认识','熟悉','掌握'];const prof=validProf.includes(proficiency)?proficiency:'未学习';
          return{word,emoji,category:category.toString(),difficulty:diff,proficiency:prof,note:note.toString()};
        }).filter(w=>w.word);
        if(imported.length===0){showToast('未找到有效数据，请检查表头格式');return}
        // 增量更新：以单词为key合并
        let addCount=0, updateCount=0;
        imported.forEach(nw=>{
          const existIdx=wordDatabase.findIndex(w=>w.word===nw.word);
          if(existIdx>=0){
            if(nw.emoji)wordDatabase[existIdx].emoji=nw.emoji;
            if(nw.category)wordDatabase[existIdx].category=nw.category;
            if(nw.difficulty)wordDatabase[existIdx].difficulty=nw.difficulty;
            if(nw.proficiency)wordDatabase[existIdx].proficiency=nw.proficiency;
            if(nw.note!==undefined&&nw.note!=='')wordDatabase[existIdx].note=nw.note;
            updateCount++;
          }else{
            wordDatabase.push(nw);
            addCount++;
          }
        });
        savePhotoCache(pc);saveData();updateStats();renderTable();renderGameSelect();
        showToast(`Excel导入成功！新增${addCount}个，更新${updateCount}个`);
      }catch(err){showToast('Excel导入失败: '+err.message)}
    };
    reader.readAsArrayBuffer(f);
  }else{
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const d=JSON.parse(ev.target.result);
        if(Array.isArray(d)&&d.length>0&&d[0].word){
          const pc=getPhotoCache();
          d.forEach(w=>{if(!w.difficulty)w.difficulty='中等';if(!w.note)w.note='';
            if(w.photoUrl){pc[w.word]=w.photoUrl;delete w.photoUrl}
          });
          savePhotoCache(pc);
          // 增量更新：以单词为key合并
          let addCount=0, updateCount=0;
          d.forEach(nw=>{
            const existIdx=wordDatabase.findIndex(w=>w.word===nw.word);
            if(existIdx>=0){
              if(nw.emoji)wordDatabase[existIdx].emoji=nw.emoji;
              if(nw.category)wordDatabase[existIdx].category=nw.category;
              if(nw.difficulty)wordDatabase[existIdx].difficulty=nw.difficulty;
              if(nw.proficiency)wordDatabase[existIdx].proficiency=nw.proficiency;
              if(nw.note!==undefined&&nw.note!=='')wordDatabase[existIdx].note=nw.note;
              updateCount++;
            }else{
              wordDatabase.push(nw);
              addCount++;
            }
          });
          saveData();updateStats();renderTable();renderGameSelect();
          showToast(`JSON导入成功！新增${addCount}个，更新${updateCount}个`);
        }else showToast('文件格式不正确');
      }catch(err){showToast('JSON导入失败')}
    };
    reader.readAsText(f);
  }
  e.target.value='';
}

// ===== Game Select =====
function renderGameSelect(){
  const cats=[...new Set(wordDatabase.map(w=>w.category))].sort();
  const diffs=['简单','中等','困难'];

  let catH='<div class="chip chip-select-all" onclick="toggleAllCats(this)">全选</div>';
  cats.forEach(c=>{const n=wordDatabase.filter(w=>w.category===c).length;catH+=`<div class="chip" data-cat="${c}" onclick="toggleCat(this,'${c}')">${c}<span class="count">${n}</span></div>`});
  document.getElementById('category-chips').innerHTML=catH;

  let diffH='<div class="chip chip-select-all" onclick="toggleAllDiffs(this)">全选</div>';
  diffs.forEach(d=>{const n=wordDatabase.filter(w=>w.difficulty===d).length;
    const color=d==='简单'?'🟢':d==='中等'?'🟡':'🔴';
    diffH+=`<div class="chip" data-diff="${d}" onclick="toggleDiff(this,'${d}')">${color} ${d}<span class="count">${n}</span></div>`});
  document.getElementById('difficulty-chips').innerHTML=diffH;

  const counts=[5,10,15,20];
  let qH='<label>每局题数:</label>';
  counts.forEach(n=>{qH+=`<div class="chip ${n===questionCount?'selected':''}" onclick="setQCount(${n},this)">${n}题</div>`});
  document.getElementById('question-count-chips').innerHTML=qH;

  // 备注筛选 chips
  const notes=[...new Set(wordDatabase.map(w=>w.note||'').filter(n=>n))].sort();
  const noteChips=document.getElementById('note-chips');
  if(noteChips){
    let noteH='<div class="chip chip-select-all">全选</div>';
    notes.forEach(n=>{
      const cnt=wordDatabase.filter(w=>w.note===n).length;
      const safeN=n.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      noteH+=`<div class="chip" data-note="${safeN}">${n}<span class="count">${cnt}</span></div>`;
    });
    noteChips.innerHTML=noteH;
    noteChips.querySelector('.chip-select-all').onclick=function(){toggleAllNotes(this)};
    noteChips.querySelectorAll('.chip:not(.chip-select-all)').forEach(el=>{el.onclick=function(){toggleNote(this)}});
  }

  updateGamePreview();
}

function toggleAllCats(el){el.classList.toggle('selected');const chips=document.querySelectorAll('#category-chips .chip:not(.chip-select-all)');if(el.classList.contains('selected')){selectedCategories.clear();chips.forEach(c=>{c.classList.add('selected');selectedCategories.add(c.dataset.cat)})}else{selectedCategories.clear();chips.forEach(c=>c.classList.remove('selected'))}updateGamePreview()}

function toggleNote(el){
  el.classList.toggle('selected');
  const note=el.dataset.note;
  if(selectedNotes.has(note))selectedNotes.delete(note);else selectedNotes.add(note);
  updateGamePreview();
}
function toggleAllNotes(el){
  el.classList.toggle('selected');
  const chips=document.querySelectorAll('#note-chips .chip:not(.chip-select-all)');
  if(el.classList.contains('selected')){
    selectedNotes.clear();
    chips.forEach(c=>{c.classList.add('selected');selectedNotes.add(c.dataset.note)});
  }else{
    selectedNotes.clear();
    chips.forEach(c=>c.classList.remove('selected'));
  }
  updateGamePreview();

function getSelectedWords(){
  return wordDatabase.filter(w=>
    (selectedCategories.size===0||selectedCategories.has(w.category))&&
    (selectedDifficulties.size===0||selectedDifficulties.has(w.difficulty))&&
    (selectedNotes.size===0||(w.note&&selectedNotes.has(w.note)))
  );
}

// Check if a word has a visual representation (photo or good emoji)
function hasVisual(w){
  const pc=getPhotoCache();
  return !!(pc[w.word]||w.emoji);
}

function updateGamePreview(){
  const words=getSelectedWords();
  const pc=getPhotoCache();
  document.getElementById('preview-count').textContent=words.length;

  const btn=document.getElementById('btn-start');
  if(words.length<2){btn.disabled=true;btn.textContent='至少选择2个词';return}
  if(displayMode==='image'){
    const vis=words.filter(w=>hasVisual(w)).length;
    if(vis>=2){btn.disabled=false;btn.textContent='🐹 开始打地鼠！';gameMode='mole'}
    else{btn.disabled=true;btn.textContent='图片模式需要至少2个有图单词'}
  }else{
    btn.disabled=false;btn.textContent='🎧 开始听音选词！';gameMode='pick'
  }
}

// ===== Game =====
function startGame(){
  const words=getSelectedWords();
  const pc=getPhotoCache();

  if(displayMode==='image'){
    const moleWords=words.filter(w=>hasVisual(w));
    if(moleWords.length<2){showToast('图片模式需要至少2个有图单词');return}
    gameMode='mole';
    gameWords=shuffle(moleWords).slice(0,Math.min(questionCount,moleWords.length));
  }else{
    if(words.length<2){showToast('至少需要2个单词');return}
    gameMode='pick';
    gameWords=shuffle(words).slice(0,Math.min(questionCount,words.length));
  }

  currentQuestionIndex=0;gameScore=0;gameResults=[];
  switchPage('game');showQuestion();
}

function showQuestion(){
  if(currentQuestionIndex>=gameWords.length){showResult();return}
  isProcessing=false;
  currentCorrectWord=gameWords[currentQuestionIndex];

  document.getElementById('score').textContent=gameScore;
  document.getElementById('current-q').textContent=currentQuestionIndex+1;
  document.getElementById('total-q').textContent=gameWords.length;
  const prompt=document.getElementById('word-prompt');
  if(displayMode==='text'){
    prompt.innerHTML='🔊 请听声音，<u>点击这里重播</u>';
    prompt.onclick=()=>playCurrentWord();
    prompt.style.cursor='pointer';
  }else{
    prompt.textContent=currentCorrectWord.word;
    prompt.onclick=null;
    prompt.style.cursor='default';
  }

  const grid=document.getElementById('mole-grid');
  if(gameMode==='mole')setupMole(grid);else setupPick(grid);

  setTimeout(()=>playCurrentWord(),400);
}

function getVisualHtml(w){
  const pc=getPhotoCache();
  const photo=pc[w.word];
  if(photo){
    return `<img class="mole-photo" src="${photo}" alt="${w.word}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='inline-block">${w.emoji?`<span class="mole-emoji" style="display:none">${w.emoji}</span>`:''}`;
  }
  if(w.emoji){
    return `<span class="mole-emoji">${w.emoji}</span>`;
  }
  return `<span class="mole-emoji" style="font-size:20px">${w.word}</span>`;
}

function setupMole(grid){
  grid.className='mole-grid';
  const pool=gameWords.filter(w=>w.word!==currentCorrectWord.word&&hasVisual(w));
  const wrongs=shuffle(pool).slice(0,3);
  const options=shuffle([currentCorrectWord,...wrongs]);

  grid.innerHTML=options.map((w,i)=>`
    <div class="mole-hole" onclick="checkAnswer('${w.word}',this)">
      <div class="hole-top"></div>
      <div class="mole" id="mole-${i}">
        ${getVisualHtml(w)}
        <div class="mole-body"></div>
      </div>
    </div>`).join('');

  const moles=document.querySelectorAll('.mole');
  moles.forEach(m=>m.classList.remove('show'));
  options.forEach((_,i)=>{setTimeout(()=>{const m=document.getElementById('mole-'+i);if(m)m.classList.add('show')},200+i*300)});
}

function setupPick(grid){
  grid.className='pick-grid';
  const pool=gameWords.filter(w=>w.word!==currentCorrectWord.word);
  const wrongs=shuffle(pool).slice(0,3);
  const options=shuffle([currentCorrectWord,...wrongs]);

  grid.innerHTML=options.map(w=>
    `<button class="pick-option" onclick="checkAnswer('${w.word}',this)">
      <span class="pick-text">${w.word}</span>
    </button>`
  ).join('');
}

function checkAnswer(word,el){
  if(isProcessing)return;isProcessing=true;
  const correct=word===currentCorrectWord.word;
  gameResults.push({word:currentCorrectWord.word,emoji:currentCorrectWord.emoji,category:currentCorrectWord.category,difficulty:currentCorrectWord.difficulty,correct});

  if(correct){
    gameScore+=10;showFeedback('🎉');playSound('correct');
    const idx=wordDatabase.findIndex(w=>w.word===currentCorrectWord.word);
    if(idx>=0){const o=['未学习','认识','熟悉','掌握'];const ci=o.indexOf(wordDatabase[idx].proficiency);if(ci<o.length-1){wordDatabase[idx].proficiency=o[ci+1];saveData()}}
  }else{
    showFeedback('😮');playSound('wrong');
    const idx=wordDatabase.findIndex(w=>w.word===currentCorrectWord.word);
    if(idx>=0){const o=['未学习','认识','熟悉','掌握'];const ci=o.indexOf(wordDatabase[idx].proficiency);if(ci>0){wordDatabase[idx].proficiency=o[ci-1];saveData()}}
  }

  document.getElementById('score').textContent=gameScore;

  const mole=el.querySelector('.mole');
  if(mole)mole.classList.add(correct?'correct':'wrong');
  else{el.style.borderColor=correct?'var(--success)':'var(--danger)';el.style.background=correct?'#e8f5e9':'#ffebee'}

  setTimeout(()=>{currentQuestionIndex++;showQuestion()},1200);
}

function showFeedback(e){const c=document.getElementById('game-feedback');c.innerHTML=`<div class="feedback-emoji">${e}</div>`;setTimeout(()=>{c.innerHTML=''},900)}

function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();const g=ctx.createGain();
    osc.connect(g);g.connect(ctx.destination);
    if(type==='correct'){
      osc.type='sine';
      osc.frequency.setValueAtTime(523,ctx.currentTime);
      osc.frequency.setValueAtTime(659,ctx.currentTime+0.1);
      osc.frequency.setValueAtTime(784,ctx.currentTime+0.2);
      g.gain.setValueAtTime(0.2,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.4);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.4);
    }else{
      osc.type='triangle';
      osc.frequency.setValueAtTime(300,ctx.currentTime);
      osc.frequency.setValueAtTime(200,ctx.currentTime+0.15);
      g.gain.setValueAtTime(0.2,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.3);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.3);
    }
  }catch(e){}
}

function showResult(){
  switchPage('result');
  const pc=getPhotoCache();
  const total=gameResults.length;
  const correctC=gameResults.filter(r=>r.correct).length;
  const pct=Math.round(correctC/total*100);

  document.getElementById('result-score').textContent=gameScore;
  const stars=pct>=90?3:pct>=60?2:pct>=30?1:0;
  document.getElementById('result-stars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);

  document.getElementById('result-details').innerHTML=gameResults.map(r=>{
    const photo=pc[r.word];
    const img=photo?`<img class="rw-img" src="${photo}" alt="${r.word}" onerror="this.outerHTML='<span class=\\'rw-emoji\\'>${r.emoji||'📝'}</span>'">`:`<span class="rw-emoji">${r.emoji||'📝'}</span>`;
    return`<div class="result-word">
      ${img}
      <span class="word">${r.word}</span>
      <span style="font-size:10px;color:var(--text-muted)">${r.difficulty||''}</span>
      <span class="status" style="background:${r.correct?'#e8f5e9':'#ffebee'};color:${r.correct?'#2e7d32':'#c62828'}">
        ${r.correct?'✓ 正确':'✗ 再练练'}
      </span>
    </div>`;
  }).join('');
}

function autoAssignEmoji(){
  let count = 0;
  wordDatabase.forEach(w => {
    if(w.emoji) return; // skip if already has emoji
    const key = w.word.toLowerCase().trim();
    if(EMOJI_DICT[key]){
      w.emoji = EMOJI_DICT[key];
      count++;
    }
  });
  if(count === 0){
    showToast('所有单词都已匹配Emoji，无需再匹配！');
  } else {
    saveData();
    updateStats();
    renderTable();
    showToast(`成功匹配 ${count} 个单词的Emoji！`);
  }
}


// ===== Restore Default =====
function restoreDefault(){
  if(!confirm('确定恢复默认词库吗？\n当前词库数据将被清除，恢复为初始默认词库。'))return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(PHOTO_CACHE_KEY);
  showToast('正在恢复默认词库...');
  setTimeout(()=>location.reload(),500);
}
